<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Celebrants Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { padding: 20px; background-color: #f5f5f5; color: #222; transition: background-color .3s, color .3s; }
        .container { max-width: 1100px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 2px 10px rgba(0,0,0,.1); }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        .upload-area { margin-bottom: 20px; padding: 15px; border: 2px dashed #28a745; border-radius: 6px; text-align: center; }
        input[type="file"] { margin: 10px 0; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        select, input[type="text"], button { padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        button { background-color: #007bff; color: #fff; border: none; cursor: pointer; }
        button:hover { opacity: .9; }
        .btn-success { background-color: #28a745; }
        .btn-danger { background-color: #dc3545; }
        .btn-dark { background-color: #343a40; }
        .btn-warning { background-color: #ff9800; color: #222; }
        .table-container { overflow-x: auto; max-height: 650px; overflow-y: auto; border: 1px solid #ddd; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; white-space: nowrap; }
        th { background-color: #007bff; color: #fff; position: sticky; top: 0; z-index: 2; }
        td.number-col { text-align: right; }
        td.date-col { text-align: left; }
        tr:hover { background-color: #f1f8ff; }
        .no-data { text-align: center; color: #666; padding: 25px; }
        .status { font-size: 14px; margin: 8px 0; font-weight: bold; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .warning { color: #ff9800; }
        .hint { font-size: 13px; color: #666; margin-top: 6px; }

        body.dark-mode { background-color: #121212; color: #f1f1f1; }
        body.dark-mode .container { background-color: #1e1e1e; color: #f1f1f1; box-shadow: 0 2px 12px rgba(255,255,255,.08); }
        body.dark-mode h1 { color: #fff; }
        body.dark-mode .upload-area { background-color: #181818; border-color: #4caf50; }
        body.dark-mode select, body.dark-mode input[type="text"], body.dark-mode input[type="file"] { background-color: #2b2b2b; color: #fff; border: 1px solid #555; }
        body.dark-mode input::placeholder { color: #bbb; }
        body.dark-mode .table-container { border-color: #444; }
        body.dark-mode table { background-color: #1e1e1e; color: #fff; }
        body.dark-mode th { background-color: #0d47a1; color: #fff; }
        body.dark-mode td { border-bottom: 1px solid #444; }
        body.dark-mode tr:hover { background-color: #2a2a2a; }
        body.dark-mode .no-data { color: #ccc; }
        body.dark-mode .btn-dark { background-color: #f8f9fa; color: #222; }
        body.dark-mode .hint { color: #bbb; }

        @media (max-width: 700px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            .controls { flex-direction: column; align-items: stretch; }
            select, input[type="text"], button { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎂 Birthday Celebrants Viewer</h1>

    <div class="upload-area">
        <h3>Upload Excel File (REPLACES Data in Google Sheets)</h3>
        <input type="file" id="excelFile" accept=".xlsx, .xls, .csv">
        <p>Supported formats: .xlsx, .xls, .csv — Use only to update data</p>
        <p class="hint">Display is limited to: first_name, mid_name, last_name, date_birth, age_today</p>
        <div id="statusMsg" class="status"></div>
    </div>

    <div class="controls">
        <select id="birthdayMonthSelect">
            <option value="">Select Birthday Month</option>
            <option value="1">January</option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
        </select>

        <input type="text" id="searchInput" placeholder="Search displayed birthday celebrants...">
        <button id="birthdayBtn" class="btn-warning">🎂 Show Birthday Celebrants</button>
        <button id="resetBtn">Reset</button>
        <button id="refreshBtn" class="btn-success">🔄 Refresh Data</button>
        <button id="clearDataBtn" class="btn-danger">Clear All Data</button>
        <button id="themeToggleBtn" class="btn-dark">🌙 Dark Mode</button>
    </div>

    <div class="table-container">
        <table id="dataTable">
            <tbody id="tableBody">
                <tr><td class="no-data">🔄 Loading data FROM GOOGLE SHEETS...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw2uXE-VzAjXQ7GMWEpVrZpvaoOWct1ti-25NBavFQ27ywBBlmh6oJQzST9spf4_bJwAg/exec";
    const SHEET_NAME = "Sheet1";

    const birthdayColumns = ["first_name", "mid_name", "last_name", "date_birth", "age_today"];

    let headers = [];
    let allRawData = [];
    let columnTypes = [];
    let currentBirthdayData = [];

    const themeToggleBtn = document.getElementById("themeToggleBtn");

    function applySavedTheme() {
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") {
            document.body.classList.add("dark-mode");
            themeToggleBtn.textContent = "☀️ Light Mode";
        } else {
            document.body.classList.remove("dark-mode");
            themeToggleBtn.textContent = "🌙 Dark Mode";
        }
    }

    themeToggleBtn.addEventListener("click", function () {
        document.body.classList.toggle("dark-mode");
        if (document.body.classList.contains("dark-mode")) {
            localStorage.setItem("theme", "dark");
            themeToggleBtn.textContent = "☀️ Light Mode";
        } else {
            localStorage.setItem("theme", "light");
            themeToggleBtn.textContent = "🌙 Dark Mode";
        }
    });

    applySavedTheme();

    function normalizeHeader(header) {
        return header ? header.toString().trim().toLowerCase() : "";
    }

    function getColumnIndexByName(columnName) {
        return headers.findIndex(header => normalizeHeader(header) === normalizeHeader(columnName));
    }

    function isNumberValue(val) {
        if (val === "" || val === null || val === undefined) return false;
        if (typeof val === "number") return true;
        if (typeof val === "string") return !isNaN(Number(val.replace(/,/g, "")));
        return false;
    }

    function isDateColumnByHeader(header) {
        if (!header) return false;
        const h = header.toString().toLowerCase();
        return h.includes("date") || h.includes("birth") || h.includes("appoint") || h.includes("promo") || h.includes("retire") || h.includes("effectivity");
    }

    function isDateValue(val) {
        if (!val) return false;
        if (val instanceof Date && !isNaN(val.getTime())) return true;
        if (typeof val === "number" && val > 25569 && val < 60000) return true;
        if (typeof val === "string") {
            const trimmed = val.trim();
            if (/^\d{4}-\d{2}-\d{2}T/.test(trimmed)) return true;
            if (/^\d{4}[-/]\d{1,2}[-/]\d{1,2}$/.test(trimmed)) return true;
            if (/^\d{1,2}[-/]\d{1,2}[-/]\d{4}$/.test(trimmed)) return true;
            if (!isNaN(Date.parse(trimmed)) && /[a-zA-Z]/.test(trimmed)) return true;
        }
        return false;
    }

    function detectColumnTypes(dataRows) {
        if (!dataRows || dataRows.length === 0) return [];
        const colCount = headers.length || dataRows[0].length;
        const types = new Array(colCount).fill("text");

        for (let col = 0; col < colCount; col++) {
            if (isDateColumnByHeader(headers[col])) {
                types[col] = "date";
                continue;
            }

            let dateCount = 0;
            let numberCount = 0;
            let totalCount = 0;

            for (let row = 0; row < dataRows.length; row++) {
                const val = dataRows[row][col];
                if (val === "" || val === null || val === undefined) continue;
                totalCount++;
                if (isDateValue(val)) dateCount++;
                else if (isNumberValue(val)) numberCount++;
            }

            if (totalCount === 0) types[col] = "text";
            else if (dateCount / totalCount >= 0.6) types[col] = "date";
            else if (numberCount / totalCount >= 0.6) types[col] = "number";
            else types[col] = "text";
        }
        return types;
    }

    function formatDate(dateValue) {
        if (!dateValue) return "";
        const date = parseBirthdayDate(dateValue);
        if (!date) return dateValue;
        return date.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "2-digit" });
    }

    function formatNumber(numValue) {
        if (numValue === "" || numValue === null || numValue === undefined) return "";
        const num = Number(numValue.toString().replace(/,/g, ""));
        if (isNaN(num)) return numValue;
        return num.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function formatCell(value, type) {
        if (value === null || value === undefined) return "";
        if (type === "date") return formatDate(value);
        if (type === "number") return formatNumber(value);
        return value;
    }

    function parseBirthdayDate(value) {
        if (!value) return null;
        let date;

        if (typeof value === "number") {
            date = new Date((value - 25569) * 86400 * 1000);
        } else if (value instanceof Date) {
            date = value;
        } else if (typeof value === "string") {
            const trimmed = value.trim();
            date = new Date(trimmed);

            if (isNaN(date.getTime())) {
                const match = trimmed.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$/);
                if (match) {
                    const a = Number(match[1]);
                    const b = Number(match[2]);
                    const y = Number(match[3]);
                    const month = a > 12 ? b : a;
                    const day = a > 12 ? a : b;
                    date = new Date(y, month - 1, day);
                }
            }
        }

        if (!date || isNaN(date.getTime())) return null;
        return date;
    }

    function calculateAgeToday(dateBirthValue) {
        const birthDate = parseBirthdayDate(dateBirthValue);
        if (!birthDate) return "";

        const today = new Date();
        let age = today.getFullYear() - birthDate.getFullYear();
        const birthdayPassed = today.getMonth() > birthDate.getMonth() ||
            (today.getMonth() === birthDate.getMonth() && today.getDate() >= birthDate.getDate());

        if (!birthdayPassed) age--;
        return age;
    }

    function buildBirthdayRows(monthNumber) {
        const selectedMonth = Number(monthNumber);
        const dateBirthIndex = getColumnIndexByName("date_birth");
        const columnIndexes = birthdayColumns.map(columnName => getColumnIndexByName(columnName));

        if (dateBirthIndex === -1) return { error: 'Column "date_birth" was not found.' };

        const rows = allRawData
            .filter(row => {
                const birthDate = parseBirthdayDate(row[dateBirthIndex]);
                if (!birthDate) return false;
                return birthDate.getMonth() + 1 === selectedMonth;
            })
            .map(row => {
                return birthdayColumns.map((columnName, index) => {
                    const sourceIndex = columnIndexes[index];

                    if (columnName === "age_today") {
                        if (sourceIndex !== -1 && row[sourceIndex] !== undefined && row[sourceIndex] !== "") {
                            const existingAge = row[sourceIndex];
                            return isNumberValue(existingAge) ? Number(existingAge.toString().replace(/,/g, "")) : existingAge;
                        }
                        return calculateAgeToday(row[dateBirthIndex]);
                    }

                    if (sourceIndex === -1) return "";
                    if (columnName === "date_birth") return formatDate(row[sourceIndex]);
                    return row[sourceIndex] !== undefined && row[sourceIndex] !== null ? row[sourceIndex] : "";
                });
            });

        return { rows };
    }

    function displayBirthdayTable(data, message) {
        const tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = "";

        const headerRow = document.createElement("tr");
        birthdayColumns.forEach(header => {
            const th = document.createElement("th");
            th.textContent = header;
            headerRow.appendChild(th);
        });
        tableBody.appendChild(headerRow);

        if (!data || data.length === 0) {
            const tr = document.createElement("tr");
            const td = document.createElement("td");
            td.className = "no-data";
            td.colSpan = birthdayColumns.length;
            td.textContent = message || "No birthday celebrants found.";
            tr.appendChild(td);
            tableBody.appendChild(tr);
            return;
        }

        data.forEach(row => {
            const tr = document.createElement("tr");
            row.forEach((cell, index) => {
                const td = document.createElement("td");
                td.textContent = cell !== undefined && cell !== null ? cell : "";
                if (birthdayColumns[index] === "age_today") td.className = "number-col";
                if (birthdayColumns[index] === "date_birth") td.className = "date-col";
                tr.appendChild(td);
            });
            tableBody.appendChild(tr);
        });
    }

    function showBirthdayCelebrants() {
        const selectedMonth = document.getElementById("birthdayMonthSelect").value;
        const keyword = document.getElementById("searchInput").value.trim().toLowerCase();

        if (!headers || headers.length === 0 || !allRawData || allRawData.length === 0) {
            displayBirthdayTable([], "No data available. Please load or upload data first.");
            showStatus("⚠️ No data available. Please load or upload data first.", "warning");
            return;
        }

        if (!selectedMonth) {
            currentBirthdayData = [];
            displayBirthdayTable([], "Please select a birthday month to show celebrants.");
            showStatus("⚠️ Please select a birthday month.", "warning");
            return;
        }

        const result = buildBirthdayRows(selectedMonth);
        if (result.error) {
            displayBirthdayTable([], result.error);
            showStatus("❌ " + result.error, "error");
            return;
        }

        currentBirthdayData = result.rows;
        let displayedRows = currentBirthdayData;

        if (keyword) {
            displayedRows = currentBirthdayData.filter(row =>
                row.some(cell => (cell !== undefined && cell !== null ? cell.toString().toLowerCase() : "").includes(keyword))
            );
        }

        const monthName = document.querySelector(`#birthdayMonthSelect option[value="${selectedMonth}"]`).textContent;
        const message = keyword
            ? `No matching birthday celebrants found for ${monthName}.`
            : `No birthday celebrants found for ${monthName}.`;

        displayBirthdayTable(displayedRows, message);
        showStatus(`🎂 Showing ${displayedRows.length} birthday celebrant(s) for ${monthName}.`, "success");
    }

    window.addEventListener("load", function () {
        loadDataFromSheet();
    });

    document.getElementById("refreshBtn").addEventListener("click", function () {
        showStatus("🔄 Refreshing latest data from Google Sheets...", "success");
        loadDataFromSheet();
    });

    document.getElementById("excelFile").addEventListener("change", function (e) {
        const file = e.target.files[0];
        if (!file) return;
        showStatus("⏳ Reading file...", "success");

        const reader = new FileReader();
        reader.onload = function (event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: "array", cellDates: true });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, raw: true });

            if (jsonData.length < 1) {
                showStatus("❌ No data found in file", "error");
                return;
            }

            headers = jsonData[0];
            allRawData = jsonData.slice(1).filter(row => row.some(cell => cell !== undefined && cell !== ""));
            columnTypes = detectColumnTypes(allRawData);
            const formattedDataForSaving = allRawData.map(row => headers.map((_, i) => formatCell(row[i], columnTypes[i])));

            showStatus("⏳ Saving new data to Google Sheets...", "success");

            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "saveData", sheetName: SHEET_NAME, headers: headers, data: formattedDataForSaving })
            })
            .then(res => res.json())
            .then(result => {
                if (result.error) {
                    showStatus("❌ " + result.error, "error");
                    return;
                }
                showStatus("✅ Google Sheets UPDATED! Refreshing data...", "success");
                loadDataFromSheet();
            })
            .catch(err => showStatus("❌ Error: " + err.message, "error"));
        };
        reader.readAsArrayBuffer(file);
    });

    function loadDataFromSheet() {
        fetch(GOOGLE_SCRIPT_URL + "?action=getData&sheetName=" + encodeURIComponent(SHEET_NAME))
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                displayBirthdayTable([], data.error);
                showStatus("❌ " + data.error, "error");
                return;
            }

            if (data && data.headers && data.data && data.headers.length > 0) {
                headers = data.headers;
                allRawData = data.data;
                columnTypes = detectColumnTypes(allRawData);
                showStatus("✅ Latest data loaded FROM GOOGLE SHEETS. Select a month to show birthday celebrants.", "success");
                showBirthdayCelebrants();
            } else {
                headers = [];
                allRawData = [];
                columnTypes = [];
                currentBirthdayData = [];
                displayBirthdayTable([], "Google Sheet is empty. Upload Excel file to add data.");
                showStatus("⚠️ Google Sheet is empty", "warning");
            }
        })
        .catch(err => {
            displayBirthdayTable([], "Failed to load from Google Sheets. Check your connection/URL.");
            showStatus("❌ Error loading data: " + err.message, "error");
        });
    }

    document.getElementById("birthdayBtn").addEventListener("click", showBirthdayCelebrants);
    document.getElementById("birthdayMonthSelect").addEventListener("change", showBirthdayCelebrants);
    document.getElementById("searchInput").addEventListener("input", showBirthdayCelebrants);
    document.getElementById("searchInput").addEventListener("keydown", function (e) {
        if (e.key === "Enter") showBirthdayCelebrants();
    });

    document.getElementById("resetBtn").addEventListener("click", function () {
        document.getElementById("birthdayMonthSelect").value = "";
        document.getElementById("searchInput").value = "";
        currentBirthdayData = [];
        displayBirthdayTable([], "Please select a birthday month to show celebrants.");
        showStatus("✅ View reset. Select a birthday month.", "success");
    });

    document.getElementById("clearDataBtn").addEventListener("click", function () {
        if (!confirm("⚠️ Delete ALL data from Google Sheet? This cannot be undone!")) return;

        fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ action: "clearData", sheetName: SHEET_NAME })
        })
        .then(res => res.json())
        .then(result => {
            if (result.error) {
                showStatus("❌ " + result.error, "error");
                return;
            }
            headers = [];
            allRawData = [];
            columnTypes = [];
            currentBirthdayData = [];
            document.getElementById("birthdayMonthSelect").value = "";
            document.getElementById("searchInput").value = "";
            displayBirthdayTable([], "Sheet cleared. Upload new file to start.");
            showStatus("✅ Sheet cleared", "success");
        })
        .catch(err => showStatus("❌ Error: " + err.message, "error"));
    });

    function showStatus(text, type) {
        const el = document.getElementById("statusMsg");
        el.textContent = text;
        el.className = "status " + type;
    }
</script>
</body>
</html>
